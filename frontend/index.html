<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SMS2Web</title>
</head>
<body>

    <h1>Read your SMS from anywhere</h1>
    <br>

    <a href="https://sms2web.onrender.com/">Click Me!!!!!!! Start backend now</a>

    <div>
        <h3>Register</h3>
        <label>Email</label>
        <input id="emailRegister">

        <label>Password</label>
        <input id="passwordRegister">
        <button onclick="register()">Register</button>
    </div>


    <div>
        <h3>Login</h3>
        <label>Email</label>
        <input id="emailLogin">

        <label>Password</label>
        <input id="passwordLogin">
        <button onclick="login()">Login</button>

    </div>
    <br>
    <br>
    <br>

    <h2>SMS</h2>

    <div>
        <ul id="sms"></ul>
    </div>

    <div id="syncCodeContainer" style="display: none; border: 2px solid black; padding: 20px; margin-top: 20px; background-color: #f0f0f0;">
        <h2>Your Sync Code: <span id="syncCodeDisplay" style="color: red; font-family: monospace; font-size: 1.5em;"></span></h2>
        <p><b>Install the Android App on the target phone and enter this code!</b></p>
    </div>

<script src="script.js"></script>
</body>
</html>
